<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Масляный дневник</title>
  
  <!-- PWA: позволяет добавить на главный экран как приложение -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Масляный дневник">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛢️</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛢️</text></svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7; min-height: 100vh; padding: 16px;
      display: flex; justify-content: center; align-items: flex-start;
    }
    .app {
      max-width: 420px; width: 100%; background: white;
      border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      padding: 24px 20px 32px; margin: 10px 0;
    }
    h1 { font-size: 22px; font-weight: 650; margin-bottom: 4px; color: #1c1c1e; }
    .subtitle { color: #6e6e73; font-size: 14px; margin-bottom: 20px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .input-group { margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8e8e93; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 14px 16px; border: 1px solid #e5e5ea; border-radius: 14px; font-size: 16px; background: #f9f9fb; outline: none; }
    input:focus, select:focus { border-color: #0a84ff; background: white; }
    .btn { background: #0a84ff; color: white; font-weight: 600; font-size: 16px; padding: 14px 20px; border: none; border-radius: 16px; width: 100%; cursor: pointer; margin-top: 6px; }
    .btn:active { background: #0066d6; transform: scale(0.98); }
    .btn-secondary { background: #f2f2f7; color: #0a84ff; }
    .card { background: #f9f9fb; border-radius: 20px; padding: 18px; margin: 16px 0; }
    .progress-container { height: 12px; background: #e5e5ea; border-radius: 20px; margin: 12px 0 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: #34c759; width: 0%; border-radius: 20px; transition: width 0.5s; }
    .progress-bar.warning { background: #ff9500; }
    .progress-bar.danger { background: #ff3b30; }
    .stats { display: flex; justify-content: space-between; font-size: 14px; color: #3a3a3c; }
    .offer-box { background: #fff9e6; border: 1px solid #ffd60a; border-radius: 16px; padding: 14px; margin-top: 14px; font-size: 14px; display: none; }
    .history-item { background: white; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; border: 1px solid #f0f0f5; display: flex; justify-content: space-between; align-items: center; }
    .back-link { font-size: 14px; color: #0a84ff; margin-bottom: 12px; cursor: pointer; }
    hr { margin: 20px 0 15px; border: 0.5px solid #e5e5ea; }
  </style>
</head>
<body>
<div class="app" id="appRoot">

  <!-- ЭКРАН НАСТРОЙКИ -->
  <div id="setupPanel" class="panel active">
    <h1>🛢️ Масляный дневник</h1>
    <div class="subtitle">Карта «Подари учёт» — настройте дневник для своего авто</div>
    <div class="input-group">
      <label>Марка и модель</label>
      <input type="text" id="carInput" placeholder="BMW X3 F25" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Текущий пробег (км)</label>
      <input type="number" id="mileageInput" placeholder="120000" inputmode="numeric">
    </div>
    <div class="input-group">
      <label>Залитое масло</label>
      <select id="oilSelect">
        <option value="UltraSynth 5W-40">UltraSynth 5W-40</option>
        <option value="EcoGuard 5W-30">EcoGuard 5W-30</option>
        <option value="TurboPower 10W-40">TurboPower 10W-40</option>
        <option value="LongLife III 5W-30">LongLife III 5W-30</option>
        <option value="custom">Другое (ввести)</option>
      </select>
    </div>
    <div class="input-group" id="customOilGroup" style="display:none;">
      <label>Укажите масло</label>
      <input type="text" id="customOilInput" placeholder="Марка и вязкость">
    </div>
    <button class="btn" id="saveSetupBtn">Создать дневник</button>
    <div style="text-align:center; margin-top:16px; font-size:12px; color:#8e8e93;">Данные только в вашем телефоне</div>
  </div>

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="mainPanel" class="panel">
    <h1>🛢️ Мой дневник</h1>
    <div class="subtitle" id="carDisplay"></div>
    <div class="card">
      <div style="font-weight:600;">Износ масла</div>
      <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
      <div class="stats"><span id="mileageInfo"></span><span id="remainingInfo"></span></div>
    </div>
    <div class="offer-box" id="offerBlock">
      🎁 <strong>Пора менять масло!</strong> Скидка 10% по промокоду <strong>FRIEND10</strong> в магазине.
      <div style="margin-top:6px;">👉 <a href="#" style="color:#0a84ff;" onclick="alert('Ссылка на интернет-магазин')">Перейти в каталог</a></div>
    </div>
    <button class="btn" id="recordChangeBtn">➕ Записать замену</button>
    <button class="btn btn-secondary" id="showHistoryBtn">📋 История замен</button>
    <hr>
    <button class="btn btn-secondary" id="shareGiftBtn">🎁 Подарить учёт другу</button>
    <div style="text-align:center; font-size:12px; color:#8e8e93; margin-top:4px;">Друг получит такой же дневник</div>
  </div>

  <!-- ИСТОРИЯ -->
  <div id="historyPanel" class="panel">
    <div class="back-link" id="backBtn">← Назад</div>
    <h1>📋 История замен</h1>
    <div id="historyList" style="margin-top:14px;"></div>
    <button class="btn btn-secondary" id="clearHistoryBtn" style="margin-top:20px;">Очистить историю</button>
  </div>

</div>

<script>
(function() {
  const STORAGE_KEY = 'oil_diary_v2';
  const INTERVAL = 10000;

  const $ = id => document.getElementById(id);
  const setupPanel = $('setupPanel'),
